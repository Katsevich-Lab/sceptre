# Windows-only diagnostic for Bioconductor submission readiness.
# Bioconductor asks that GitHub Actions files stay off the submitted branch.
on:
  workflow_dispatch:
  push:
    branches:
      - codex-windows-ci-diagnostic

name: R-CMD-check-bioc-windows-diagnostic

permissions: read-all

jobs:
  windows-bioc-check:
    runs-on: windows-latest
    name: windows-latest (Bioconductor devel)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true
      R_KEEP_PKG_SOURCE: yes
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      TZ: UTC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Use Bioconductor check environment
        shell: pwsh
        run: |
          $checkRenviron = Join-Path $env:GITHUB_WORKSPACE "check.Renviron"
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/Bioconductor/packagebuilder/devel/check.Renviron" `
            -OutFile $checkRenviron
          "R_CHECK_ENVIRON=$checkRenviron" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Record Windows diagnostic environment
        shell: pwsh
        run: |
          Rscript -e "sessionInfo()"
          if (Get-Command make -ErrorAction SilentlyContinue) { make --version } else { "make not found on PATH" }
          if (Get-Command gcc -ErrorAction SilentlyContinue) { gcc --version } else { "gcc not found on PATH" }
          if (Get-Command g++ -ErrorAction SilentlyContinue) { g++ --version } else { "g++ not found on PATH" }
          Get-ChildItem Env: | Where-Object { $_.Name -like "RTOOLS*" } | Format-Table -AutoSize

      - name: Configure Bioconductor devel
        shell: Rscript {0}
        run: |
          if (!requireNamespace("BiocManager", quietly = TRUE)) {
            install.packages("BiocManager")
          }
          BiocManager::install(version = "devel", ask = FALSE, update = FALSE)
          message("Bioconductor version: ", BiocManager::version())

      - name: Check Bioconductor dependency policy
        shell: Rscript {0}
        run: |
          description <- read.dcf("DESCRIPTION")[1, ]
          if ("Remotes" %in% names(description)) {
            warning(
              "Bioconductor submissions cannot use Remotes:. Current Remotes: ",
              description[["Remotes"]]
            )
          }

      - name: Install package dependencies
        shell: Rscript {0}
        run: |
          bioc_repos <- BiocManager::repositories()
          bioc_repos <- bioc_repos[!names(bioc_repos) %in% c("BioCann", "BioCworkflows")]
          message("Using repositories:")
          print(bioc_repos)
          message("Note: BioCann and BioCworkflows are filtered because their Bioconductor devel Windows binary indexes can be absent.")
          if (!requireNamespace("remotes", quietly = TRUE)) {
            install.packages("remotes", repos = bioc_repos)
          }
          install.packages(c("BiocCheck", "rcmdcheck", "sessioninfo"), repos = bioc_repos)
          remotes::install_deps(
            dependencies = TRUE,
            repos = bioc_repos,
            upgrade = "never",
            quiet = FALSE
          )

      - name: Session info
        shell: Rscript {0}
        run: |
          sessioninfo::session_info(include_base = TRUE)

      - name: Run BiocCheck git-clone checks
        shell: Rscript {0}
        run: |
          BiocCheck::BiocCheckGitClone(".")

      - name: Run R CMD check
        shell: Rscript {0}
        run: |
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--timings"),
            build_args = c("--no-manual", "--no-resave-data"),
            check_dir = "check",
            error_on = "warning"
          )

      - name: Run BiocCheck
        shell: Rscript {0}
        run: |
          tarballs <- dir("check", pattern = "[.]tar[.]gz$", full.names = TRUE)
          if (!length(tarballs)) {
            stop("No source tarball found in check/")
          }
          BiocCheck::BiocCheck(
            tarballs[[1]],
            `new-package` = TRUE,
            `quit-with-status` = TRUE
          )

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-bioc-diagnostic-logs
          path: |
            check
            *.Rcheck
            *.tar.gz
            check.Renviron
            **/00check.log
            **/testthat.Rout*
            **/install.out
          if-no-files-found: warn
